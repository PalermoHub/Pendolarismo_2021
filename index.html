  integrity="sha384-4sbA4B4Oqxkzs6apu8HaZcGrL3BySmt0tO/LQf6al3hkgq8ijZFxkTkvxxZZ/3PU" crossorigin="anonymous"></script>
<script src="https://unpkg.com/deck.gl@9.0.35/dist.min.js"
  integrity="sha384-Vr15y1r5cZ83amAjUB8zTA39xVjYBmxu/q5yF+gyhKdcf73hnNmOA1FkvIZGqLmX" crossorigin="anonymous"></script>
      <meta name="keywords" content="Open Data, Sicilia, PAI, Geologia, istat, pendolarismmo, Palermo">

<body>
<div id="map"></div>
<div id="legend">
  <h3>Legenda <span id="legendHint">(clic per filtrare)</span></h3>
  <div class="legend-row" data-kind="out"><i class="swatch line" style="background:#ff4400"></i> Uscita (residenti verso altri comuni)</div>
  <div class="legend-row" data-kind="in"><i class="swatch line" style="background:#fbeb7c"></i> Entrata (occupati da altri comuni)</div>
  <div class="legend-row" data-kind="internal"><i class="swatch dot" style="background:#0000dd"></i> Flusso interno all'area / nodo misto</div>
  <div class="legend-row" data-kind="external"><i class="swatch dot" style="background:#b4b4b4"></i> Comune collegato (fuori area)</div>
  <div class="legend-row legend-static"><i class="swatch dot" style="background:#3d7fff"></i> Comune selezionato</div>
</div>
<button id="panelToggle" title="Apri/chiudi pannello" aria-label="Apri/chiudi pannello">◀</button>

<!-- ── Barra di ricerca intelligente ── -->
<div id="geoSearchArea">
  <div id="geoChips"></div>
  <div id="geoSearchbar">
    <span class="geo-si">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
        <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
    </span>
    <input type="text" id="geoSearchInput"
           placeholder="Cerca regione, provincia, comune…"
           autocomplete="off">
    <button id="geoSearchClear" style="display:none">&#x2715;</button>
    <div class="geo-sep"></div>
    <button id="geoFilterBtn" title="Filtri">
      <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
        <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
      </svg>
      <span id="geoFilterBadge" style="display:none"></span>
    </button>
    <div id="geoSearchDD"></div>
  </div>
</div>

<!-- ── Modale filtri geografici ── -->
<div id="geoFilterOverlay"></div>
<div id="geoFilterModal">
  <div class="gfm-header">
    <h3>Filtri geografici</h3>
    <button id="geoModalClose">&#x2715;</button>
  </div>
  <div class="gfm-group">
    <label>Regione</label>
    <select id="filterRegione"><option value="">Tutte le regioni</option></select>
  </div>
  <div class="gfm-group">
    <label>Provincia</label>
    <select id="filterProvincia" disabled><option value="">Tutte le province</option></select>
  </div>
  <div class="gfm-group">
    <label>Comune</label>
    <select id="filterComune" disabled><option value="">Seleziona comune</option></select>
  </div>
  <div class="gfm-footer">
    <button id="geoModalReset">Ripristina</button>
    <button id="geoModalApply">Applica</button>
  </div>
</div>

<aside id="panel">
  <div id="allToggle">
    <label><input type="checkbox" id="showAllFlows" checked /> Mostra tutti i collegamenti</label>
    <label><input type="checkbox" id="showNodes" checked /> Mostra punti sui comuni</label>
  </div>
  <div id="directionToggle">
    <label><input type="radio" name="dir" value="out" /> Uscita</label>
    <label><input type="radio" name="dir" value="in" /> Entrata</label>
    <label><input type="radio" name="dir" value="both" checked /> Entrambi</label>
  </div>
  <div id="comuneToggle">
    <label><input type="checkbox" id="showAllComuneLinks" /> Mostra tutti i collegamenti del comune</label>
  </div>
  <div id="panelBody">
    <p id="panelEmpty">Clicca un comune sulla mappa.</p>
  </div>
  <p id="panelNote">Vista globale ispirata dalla mappa di <a href="https://gjrichter.github.io/pages/DataVizi/FUA/index_pendolari_2021_arcs_saldo_sum_FUA_dark.html" target="_blank" rel="noopener">Gueter Richer</a></p>
</aside>
<a id="odsLogo" href="https://opendatasicilia.it/" target="_blank" rel="noopener" title="Open Data Sicilia">
  <img src="img/opendatasicilia.png" alt="Open Data Sicilia" />
</a>

<script type="module" src="js/app.js"></script>

</body>
</html>
